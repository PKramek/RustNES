name: Rust CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -Dwarnings

jobs:
  validation-and-testing:
    name: Validation and Testing
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rustnes-ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Cargo tooling
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.132, cargo-deny@0.19.0, cargo-machete@0.9.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Reject real ROM-backed tests
        run: sh scripts/check-no-real-rom-tests.sh

      - name: Check unused dependencies
        run: cargo machete

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run cargo-deny
        run: cargo deny check

      - name: Run tests
        run: cargo nextest run --all-targets --all-features